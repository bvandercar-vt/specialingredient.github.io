    <script src="https://connect.soundcloud.com/sdk/sdk-3.3.2.js"></script>
    <script>
        function init() {
            SC.initialize({
                client_id: 'DgFeY88vapbGCcK7RrT2E33nmNQVWX82',
                // redirect_uri: 'https://google.com'
            });

            const linksToTransform = document.getElementsByClassName("transform-to-sc-item")

            Array.from(linksToTransform).forEach((el) => {
                const link = el.getAttribute("href")
                SC.oEmbed(link, { auto_play: false }).then(function (oEmbed) {
                    console.log(oEmbed)
                    const titleStr = oEmbed.title.replace(' by Special Ingredient', '')

                    const soundcloudItemDiv = document.createElement("div");
                    soundcloudItemDiv.classList.add("sc-item")

                    const art = document.createElement('img');
                    art.src = oEmbed.thumbnail_url;
                    art.alt = titleStr
                    soundcloudItemDiv.appendChild(art);

                    const title = document.createElement("span");
                    title.appendChild(document.createTextNode(titleStr));
                    title.classList.add("sc-item-title")
                    soundcloudItemDiv.appendChild(title);

                    el.replaceWith(soundcloudItemDiv)
                });
            })
        }

        window.onload = init
    </script>
