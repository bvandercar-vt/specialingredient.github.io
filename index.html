<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <meta name="description" content="Special Ingredient Bass Mixes">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Special Ingredient Bass Mixes</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Permanent+Marker" type="text/css">
    <link rel="stylesheet" href="styles/index.css" type="text/css">
    <script src="http://ajax.googleapis.com/ajax/libs/jquery/1.3.2/jquery.js" type="text/javascript"></script>
    <script src="https://connect.soundcloud.com/sdk/sdk-3.3.2.js" type="text/javascript"></script>
    <script src="scripts/index.js"></script>
</head>

<body>
    <header>
        <img src="images/Logo White.png" alt="Special Ingredient" id="header-title-img">
        <div id="header-subtitle">Bass mixes from the forest</div>
    </header>
    <div id="playlist-grid">
        <div class="playlist-block">
            <h2 class="playlist-title" href="https://soundcloud.com/special-ingredient/sets/trippy-melty-wavy-bass">
                Wave / Downtempo / Trippy Bass
            </h2>
            <div class="playlist-items">
                <div class="transform-to-sc-item"
                    data-sc-link="https://soundcloud.com/special-ingredient/bass-canyon-late-night-trippy-set-pt-1-back-2-camp"
                    data-genre-desc="Trippy Chill Genre Journey - Wave, Psydub, Downtempo, Groovy Halftime"
                    data-addl-desc="Part 1 of my 4-hour Bass Canyon late night campsite set.">
                </div>
                <div class="transform-to-sc-item"
                    data-sc-link="https://soundcloud.com/special-ingredient/bass-canyon-late-night-trippy-set-pt-2"
                    data-genre-desc="Trippy Chill Genre Journey - Wave, Psydub, Downtempo"
                    data-addl-desc="Part 2 of my 4-hour Bass Canyon late night campsite set.">
                </div>
            </div>
        </div>
        <div class="playlist-block">
            <h2 class="playlist-title" href="https://soundcloud.com/special-ingredient/sets/heavier-dubstep">
                Dubstep / Riddim
            </h2>
            <div class="playlist-items scroll">
                <div class="transform-to-sc-item"
                    data-sc-link="https://soundcloud.com/special-ingredient/subwoofer-sauce-vol-1"
                    data-title="Subwoofer Sauce Vol. 1" data-genre-desc="OG Deeper Late Night Wonky Riddim"
                    data-addl-desc="I'm super picky about riddim, so if you're not a fan yet maybe I can bring you to the dark side 😉 Lotta wild sounds bouncing around the 3D space in this one, headphones recommended!">

                </div>
                <div class="transform-to-sc-item"
                    data-sc-link="https://soundcloud.com/special-ingredient/aged-cheddar-mix-vol-1"
                    data-title="Aged Cheddar Vol. 1"
                    data-genre-desc="Early 2010s Wompy Dubstep— Liquid Stranger, Bar9, etc."
                    data-addl-desc="For this mix, I mainly wanted to capture all my favorite tracks of Liquid Stranger's 2010 album Mechanoid Meltdown, a style that I think is completely unique and unmatched to this day, and fill in with my favorite bangers of the era/sound.">
                </div>
                <div class="transform-to-sc-item"
                    data-sc-link="https://soundcloud.com/special-ingredient/special-ingredient-b2b-saumii-larimer-lounge-1-26-2023"
                    data-title="Special Ingredient B2B Saumii @ Larimer Lounge 1/26/2023"
                    data-genre-desc="Multi-Genre Dubstep Journey"
                    data-addl-desc="Cooked up an extra special bass journey set with @saumiimusic for a sold out crowd at Larimer Lounge! Rinsed some of our favorite tracks we've shared over the years of DJing together. We'll see you at the next one!">

                </div>
                <div class="transform-to-sc-item"
                    data-sc-link="https://soundcloud.com/special-ingredient/bass-kitchen-mix-rage-dubstep-mix-briddim-riddim"
                    data-title="Bass Kitchen Vol. 1" data-genre-desc="Briddim, Riddim, Heavy Dubstep"
                    data-addl-desc="Wanted to make a heavy mix of newer-style, briddim-type dubstep, while also journeying into some deeper genres at times.">
                </div>
            </div>
        </div>
        <div class="playlist-block no-track-descriptions">
            <h2 class="playlist-title" href="https://soundcloud.com/special-ingredient/sets/mashups-flips">
                Mashups / Flips
            </h2>
            <div class="playlist-items">
                <div class="transform-to-sc-item"
                    data-sc-link="https://soundcloud.com/special-ingredient/akon-love-right-now-na-na-na-x-nit-grit-mashup">
                </div>
                <div class="transform-to-sc-item"
                    data-sc-link="https://soundcloud.com/special-ingredient/meduso-a-moment-vip-x-baby-bash-cyclone">
                </div>
                <div class="transform-to-sc-item"
                    data-sc-link="https://soundcloud.com/special-ingredient/ian-snow-revelation-x-travis-scott-kid-cudi-through-the-late-night">
                </div>
            </div>
        </div>
    </div>
</body>

</html>
