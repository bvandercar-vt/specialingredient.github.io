<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <meta name="description" content="Special Ingredient Bass Mixes">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Special Ingredient Bass Mixes</title>

    <link rel="stylesheet" href="style.css">
    <script type="text/javascript" src="http://ajax.googleapis.com/ajax/libs/jquery/1.3.2/jquery.js"></script>
    <script src="https://connect.soundcloud.com/sdk/sdk-3.3.2.js"></script>
    <script>
        function htmlToElement(html) {
            var template = document.createElement('template');
            html = html.trim(); // Never return a text node of whitespace as the result
            template.innerHTML = html;
            return template.content.firstChild;
        }

        function init() {
            // All anchors
            const allAnchors = document.getElementsByTagName("a")
            Array.from(allAnchors).forEach((el) => {
                // Open in new tab
                el.target = "_blank"
                el.rel = "noreferrer noopener"
            })

            // Soundcloud stuff
            SC.initialize({
                client_id: 'DgFeY88vapbGCcK7RrT2E33nmNQVWX82'
            });

            const linksToTransform = document.getElementsByClassName("transform-to-sc-item")

            Array.from(linksToTransform).forEach((el) => {
                SC.oEmbed(el.getAttribute("href"), { auto_play: false, maxheight: 150 }).then((
                    /**
                     * @type { { 
                     *      title: string
                     *      thumbnail_url: string
                     *      html: string 
                     *      description: string
                     * } } 
                     */
                    oEmbed) => {
                    console.log(oEmbed)

                    const titleStr = oEmbed.title.replace(' by Special Ingredient', '')


                    /** @type {HTMLIframeElement} */
                    const iframeElement = htmlToElement(oEmbed.html)
                    iframeElement.title = titleStr
                    iframeElement.src += "&hide_related=false&show_user=false&show_reposts=true&visual=false"

                    const iframeWrapper = document.createElement("div")
                    iframeWrapper.classList = "iframe-wrapper"
                    iframeWrapper.appendChild(iframeElement)

                    // const coverElement = document.createElement("span")
                    // coverElement.appendChild(document.createTextNode(oEmbed.description))
                    // coverElement.classList = "tooltip-text"
                    // iframeWrapper.appendChild(coverElement)


                    el.replaceWith(iframeWrapper)

                });
            })
        }

        window.onload = init
    </script>

</head>
